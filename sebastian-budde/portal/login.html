<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIlmlabor · Client Portal</title>
<style>
  :root {
    --bg: #0d0d0f;
    --card: #16161a;
    --border: #2a2a35;
    --text: #e8e8f0;
    --muted: #8888a0;
    --accent: #7c6af7;
    --accent-glow: rgba(124, 106, 247, 0.15);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 2rem;
  }
  .logo {
    font-size: 0.85rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
  }
  .logo span {
    background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    font-weight: 700;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2.5rem;
    width: 100%;
    max-width: 380px;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }
  .card-header {
    text-align: center;
  }
  .client-name {
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 0.35rem;
  }
  .client-label {
    font-size: 0.8rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .divider {
    height: 1px;
    background: var(--border);
  }
  .form-group {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }
  label {
    font-size: 0.8rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  input[type="password"] {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.8rem 1rem;
    color: var(--text);
    font-size: 1rem;
    width: 100%;
    outline: none;
    transition: border-color 0.2s;
    font-family: inherit;
  }
  input[type="password"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }
  button {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 0.85rem 1rem;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    transition: opacity 0.2s, transform 0.1s;
    font-family: inherit;
    letter-spacing: 0.02em;
  }
  button:hover { opacity: 0.9; }
  button:active { transform: scale(0.98); }
  .error {
    background: rgba(248, 113, 113, 0.1);
    border: 1px solid rgba(248, 113, 113, 0.3);
    border-radius: 8px;
    padding: 0.75rem 1rem;
    font-size: 0.85rem;
    color: #f87171;
    text-align: center;
    display: none;
  }
  .error.visible { display: block; }
  .footer {
    font-size: 0.75rem;
    color: var(--muted);
    text-align: center;
  }
</style>
</head>
<body>

<div class="logo"><span>FIlmlabor</span> · Client Portal</div>

<div class="card">
  <div class="card-header">
    <div class="client-name" id="clientName">Lade...</div>
    <div class="client-label">Command Center</div>
  </div>
  <div class="divider"></div>
  <div class="form-group">
    <label>Zugangspasswort</label>
    <input type="password" id="passwordInput" placeholder="••••••••" autofocus>
  </div>
  <div class="error" id="errorMsg">Falsches Passwort. Bitte erneut versuchen.</div>
  <button onclick="login()">Einloggen →</button>
</div>

<div class="footer">Geschützter Bereich · Nur für autorisierte Nutzer</div>

<script>
async function sha256(message) {
  const msgBuffer = new TextEncoder().encode(message);
  const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

let config = null;

async function init() {
  try {
    const resp = await fetch('./data/config.json');
    config = await resp.json();
    document.getElementById('clientName').textContent = config.client_name;
    document.title = `${config.client_name} · FIlmlabor Portal`;
    // already logged in?
    const token = sessionStorage.getItem('portal_token_' + config.client_name);
    if (token && token === config.password_hash) {
      window.location.href = './index.html';
    }
  } catch(e) {
    document.getElementById('clientName').textContent = 'Client Portal';
  }
}

async function login() {
  const pw = document.getElementById('passwordInput').value;
  if (!pw) return;
  const hash = await sha256(pw);
  if (hash === config.password_hash) {
    sessionStorage.setItem('portal_token_' + config.client_name, hash);
    window.location.href = './index.html';
  } else {
    document.getElementById('errorMsg').classList.add('visible');
    document.getElementById('passwordInput').value = '';
    document.getElementById('passwordInput').focus();
  }
}

document.getElementById('passwordInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') login();
});

init();
</script>
</body>
</html>
