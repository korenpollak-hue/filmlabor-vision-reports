<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIlmlabor OS · Client Portals</title>
<style>
  :root { --bg: #0d0d0f; --card: #16161a; --border: #2a2a35; --text: #e8e8f0; --muted: #8888a0; --accent: #7c6af7; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; gap: 1rem; }
  .logo { font-size: 0.8rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); font-weight: 500; }
  .logo span { background: linear-gradient(135deg, #fff 0%, var(--accent) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; font-weight: 700; }
  h1 { font-size: 2rem; font-weight: 800; background: linear-gradient(135deg, #fff, #b0a8ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; letter-spacing: -0.03em; text-align: center; }
  .sub { color: var(--muted); font-size: 0.9rem; text-align: center; }
  .divider { width: 40px; height: 2px; background: var(--border); border-radius: 2px; }
  .portals { display: flex; flex-direction: column; gap: 0.75rem; width: 100%; max-width: 420px; }
  .portal-link { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1rem 1.5rem; display: flex; align-items: center; justify-content: space-between; text-decoration: none; color: var(--text); transition: border-color 0.2s; }
  .portal-link:hover { border-color: var(--accent); }
  .portal-name { font-size: 0.95rem; font-weight: 600; }
  .portal-tag { font-size: 0.72rem; color: var(--muted); margin-top: 0.15rem; }
  .portal-arrow { color: var(--accent); font-size: 1.1rem; }
  .section-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); font-weight: 600; width: 100%; max-width: 420px; }
  footer { font-size: 0.72rem; color: var(--muted); text-align: center; margin-top: 1rem; }
</style>
</head>
<body>
  <div class="logo"><span>FIlmlabor</span> OS</div>
  <h1>Client Portals</h1>
  <p class="sub">Marketing Research &amp; Strategy · Automation Dashboards</p>
  <div class="divider"></div>
  <div class="section-label">Aktive Portale</div>
  <div class="portals">
    <a class="portal-link" href="./sebastian-budde/portal/login.html">
      <div>
        <div class="portal-name">Sebastian Budde</div>
        <div class="portal-tag">Vision Marketing · seit 26.03.2026</div>
      </div>
      <div class="portal-arrow">→</div>
    </a>
  </div>
  <footer>FIlmlabor OS · Vertraulich · Nur für autorisierte Nutzer</footer>
</body>
</html>
